syntax = "proto3";

package com.douyin.danmaku.proto;

option java_package = "com.douyin.danmaku.proto";
option java_multiple_files = true;

// 推送帧
message PushFrame {
    uint64 seq_id = 1;
    uint64 log_id = 2;
    uint64 service = 3;
    uint64 method = 4;
    repeated Headers headers = 5;
    string payload_encoding = 6;
    string payload_type = 7;
    bytes payload = 8;
}

// 请求头
message Headers {
    string key = 1;
    string value = 2;
}

// 响应消息
message Response {
    repeated Message messages = 1;
    string cursor = 2;
    uint64 fetch_interval = 3;
    uint64 now = 4;
    string internal_ext = 5;
    uint32 fetch_type = 6;
}

// 消息
message Message {
    string method = 1;
    bytes payload = 2;
    int64 msg_id = 3;
    int32 msg_type = 4;
    int64 offset = 5;
    bool is_score = 6;
    int64 wait = 7;
    bool has_more = 8;
}

// 聊天消息
message ChatMessage {
    Common common = 1;
    User user = 2;
    string content = 3;
    bool visible_to_sender = 4;
    bytes background_image = 5;
    string full_screen_text_color = 6;
    bytes background_image_v2 = 7;
    int32 public_area_common = 8;
    string gift_id = 9;
    repeated Text text = 10;
    repeated int32 text_type = 11;
    int64 quick_chat_id = 12;
    int32 emojis_data = 13;
    int32 monitor = 14;
    bool is_club = 15;
    int32 chat_source = 16;
    string language = 17;
    int32 flags = 18;
}

// 通用信息
message Common {
    string method = 1;
    int64 msg_id = 2;
    int64 room_id = 3;
    int64 create_time = 4;
    int32 monitor = 5;
    bool is_show_msg = 6;
    string describe = 7;
    Text display_text = 8;
    int64 fold_type = 9;
    int64 anchor_fold_type = 10;
    int64 priority_score = 11;
    string log_id = 12;
    string msg_process_filter_k = 13;
    string msg_process_filter_v = 14;
    User user = 15;
    repeated User user_complement = 16;
    int64 anchor_fans_type = 17;
    int32 at_info = 18;
}

// 用户信息
message User {
    int64 id = 1;
    int64 short_id = 2;
    string nickname = 3;
    int32 gender = 4;
    string signature = 5;
    int32 level = 6;
    int64 birthday = 7;
    string telephone = 8;
    string avatar_thumb = 9;
    string avatar_medium = 10;
    string avatar_large = 11;
    int64 verified = 12;
    int32 verify_type = 13;
    string verify_name = 14;
    int64 verify_v2_type = 15;
    string verify_v2_name = 16;
    int64 restricted_visibility = 17;
    string sec_uid = 18;
    int32 fans_club = 19;
    FansClubInfo fans_club_info = 20;
    int32 is_first_send = 21;
    int32 is_fans = 22;
    int32 user_attr = 23;
    int32 is_mystery = 24;
    int32 badge_image_list = 25;
    int32 follow_status = 26;
    string rid = 27;
    int64 top_fans_rank = 28;
    int32 is_super_admin = 29;
    int32 admin_permissions = 30;
    int32 level_emoji = 31;
    int32 level_name = 32;
    int32 linkmic_status = 33;
    int32 with_car_management_permission = 34;
    int32 has_unread_guest_card = 35;
    int32 is_weekly_dsp = 36;
    int32 new_real_time_icons = 37;
}

// 粉丝团信息
message FansClubInfo {
    int32 club_type = 1;
    int32 club_level = 2;
    string club_name = 3;
    int32 club_pre_level = 4;
    int64 score = 5;
    string badge = 6;
    int64 fans_count = 7;
}

// 文本
message Text {
    string key = 1;
    string default_pattern = 2;
    TextFormat default_content = 3;
    repeated TextFormat pieces = 4;
    string font_size_key = 5;
    string prefix = 6;
    string suffix = 7;
}

// 文本格式
message TextFormat {
    string color = 1;
    bool bold = 2;
    bool italic = 3;
    int32 weight = 4;
    int32 italic_angle = 5;
    int32 font_size = 6;
    bool use_heigh_light = 7;
    bool use_remote_clor = 8;
    bool underline = 9;
}

// 礼物消息
message GiftMessage {
    Common common = 1;
    int64 gift_id = 2;
    int64 fan_ticket_count = 3;
    int64 group_count = 4;
    int64 repeat_count = 5;
    int64 combo_count = 6;
    User user = 7;
    User to_user = 8;
    int32 repeat_end = 9;
    TextEffect text_effect = 10;
    int64 group_id = 11;
    int64 income_taskgifts = 12;
    int64 display_for_anchor = 13;
    int64 is_first_sent = 14;
    int64 diamond_count = 15;
    int64 diamond_count_for_anchor = 16;
    int64 combo_bonus = 17;
    int64 only_for_linkmic = 18;
}

// 文本特效
message TextEffect {
    Text portrait = 1;
    Text landscape = 2;
}

// 进场消息
message MemberMessage {
    Common common = 1;
    User user = 2;
    int64 member_count = 3;
    User operator = 4;
    int64 is_set_to_admin = 5;
    int64 is_top_user = 6;
    int64 rank_score = 7;
    int64 top_user_no = 8;
    int64 enter_type = 9;
    int64 action = 10;
    string action_description = 11;
    int64 user_id = 12;
    TextEffect effect_config = 13;
    string pop_str = 14;
    TextEffect effect_config_new = 15;
}

// 点赞消息
message LikeMessage {
    Common common = 1;
    int64 count = 2;
    int64 total = 3;
    int64 color = 4;
    User user = 5;
    string icon = 6;
    repeated User user_complement = 7;
    int64 linkmic_guest_uid = 8;
    string scene = 9;
    string pcm_source = 10;
    int64 pcm_rate = 11;
}

// 房间统计消息
message RoomUserSeqMessage {
    Common common = 1;
    repeated RoomUserSeqMessageContributor ranks = 2;
    int64 total = 3;
    string pop_str = 4;
    repeated RoomUserSeqMessageContributor seats = 5;
    int64 popularity = 6;
    int64 total_user = 7;
    int64 total_pvp_like = 8;
    int64 total_link_guest = 9;
}

message RoomUserSeqMessageContributor {
    int64 score = 1;
    User user = 2;
    int64 rank = 3;
    int64 delta = 4;
    bool is_hidden = 5;
    string rank_name = 6;
    string score_description = 7;
}

// 粉丝团消息
message FansClubMessage {
    Common common = 1;
    int32 type = 2;
    string content = 3;
    User user = 4;
    int64 fans_club_level = 5;
    int64 fans_club_days = 6;
    int64 fans_club_rank = 7;
    int64 fans_club_expiration = 8;
}
