syntax = "proto3";
package douyin;

option java_package = "com.douyin.danmaku.proto";
option java_multiple_files = true;

message PushFrame {
  uint64 seqId = 1;
  uint64 logId = 2;
  uint64 service = 3;
  uint64 method = 4;
  bytes payload = 8;
  string payloadType = 9;
}

message Response {
  repeated Message messages = 1;
  string cursor = 2;
  uint64 fetchInterval = 3;
  uint64 now = 4;
  string internalExt = 5;
  uint32 fetchType = 6;
  bool needAck = 9;
}

message Message {
  string method = 1;
  bytes payload = 2;
  int64 msgId = 3;
  int32 msgType = 4;
}

message ChatMessage {
  User user = 2;
  string content = 3;
  repeated Emoji emojis = 4;
  repeated EmojiImage emojiImages = 5;
  repeated TextFormat textFormats = 6;
}

message Emoji {
  string text = 1;
  string url = 2;
}

message EmojiImage {
  string text = 1;
  string url = 2;
  string emoji = 3;
}

message TextFormat {
  int32 start = 1;
  int32 end = 2;
  string color = 3;
  EmojiImage emojiImage = 4;
}

message GiftMessage {
  uint64 giftId = 2;
  uint64 comboCount = 6;
  User user = 7;
  GiftStruct gift = 15;
}

message GiftStruct {
  string name = 16;
}

message MemberMessage {
  User user = 2;
  uint64 memberCount = 3;
}

message LikeMessage {
  uint64 count = 2;
  User user = 5;
}

message SocialMessage {
  User user = 2;
  uint64 action = 4;
}

message RoomUserSeqMessage {
  uint64 total = 2;
  uint64 totalPv = 3;
  uint64 onlineUserCount = 4;
}

message User {
  uint64 id = 1;
  string nickName = 3;
  int32 level = 4;
  int32 fansClubLevel = 5;
  string fansClubName = 6;
}
