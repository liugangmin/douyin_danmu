syntax = "proto3";

package douyin;

option java_package = "com.douyin.danmaku.proto";
option java_multiple_files = true;

message PushFrame {
    uint64 seq_id = 1;
    uint64 log_id = 2;
    uint64 service = 3;
    uint64 method = 4;
    bytes headers = 5;
    string payload_encoding = 6;
    string payload_type = 7;
    bytes payload = 8;
}

message Response {
    repeated Message messages = 1;
    string cursor = 2;
    uint64 fetch_interval = 3;
    uint64 now = 4;
    string internal_ext = 5;
    uint32 fetch_type = 6;
}

message Message {
    string method = 1;
    bytes payload = 2;
    int64 msg_id = 3;
    int32 msg_type = 4;
    int64 offset = 5;
    bool need_display = 6;
}

message ChatMessage {
    User user = 1;
    string content = 2;
    bool visible_to_sender = 3;
}

message GiftMessage {
    User user = 1;
    uint64 gift_id = 2;
    uint64 gift_count = 3;
    string gift_name = 4;
    uint64 diamond_count = 5;
}

message MemberMessage {
    User user = 1;
    uint64 member_count = 2;
}

message LikeMessage {
    User user = 1;
    uint64 count = 2;
    uint64 total = 3;
}

message User {
    uint64 id = 1;
    string nickname = 2;
    string avatar = 3;
    uint32 gender = 4;
}
